name: Release pretext-native

on:
  push:
    tags:
      - 'pretext-native@*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#pretext-native@}" >> "$GITHUB_OUTPUT"

      - name: Publish pretext-native
        run: cd packages/pretext-native && npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "pretext-native@${{ steps.version.outputs.version }}"
          generate_release_notes: true
